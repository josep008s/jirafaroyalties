<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#F97316;--amber:#F59E0B;--amberLight:#FCD34D;
  --bg:#1C1917;--bgCard:#292524;--bgInput:#1C1917;
  --border:#44403C;--borderLight:#57534E;
  --text:#FAFAF9;--textMuted:#A8A29E;--textDim:#78716C;
  --green:#22C55E;--greenBg:#052E16;--greenBorder:#166534;
  --red:#EF4444;--redBg:#450A0A;--redBorder:#991B1B;
  --yellow:#EAB308;--yellowBg:#422006;--yellowBorder:#854D0E;
  --gold:#D97706;--blue:#3B82F6;--blueBg:#172554;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,system-ui,sans-serif;padding:20px 16px;min-height:100vh}
.wrap{max-width:520px;margin:0 auto}
.card{background:var(--bgCard);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:14px}
.card-sm{padding:18px}
input[type=number],input[type=text]{background:var(--bgInput);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:15px;width:100%;outline:none;transition:border .2s;font-family:inherit}
input:focus{border-color:var(--orange)}
button{font-family:inherit;cursor:pointer}
.btn-primary{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;transition:opacity .15s}
.btn-primary:disabled{background:var(--border);opacity:.5;cursor:not-allowed}
.btn-ghost{background:var(--bgInput);color:var(--textMuted);border:1px solid var(--border);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700}
.lbl{color:var(--textMuted);font-size:12px;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:4px}
.section-title{font-size:11px;font-weight:700;color:var(--textDim);text-transform:uppercase;letter-spacing:1px;margin:0 0 12px}
.tag{background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--orange);font-weight:600;display:inline-block}
.radio-btn{background:var(--bgInput);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;text-align:left;cursor:pointer;transition:all .15s;font-weight:400;width:100%;display:block}
.radio-btn.active{background:rgba(249,115,22,.09);border-color:var(--orange);color:var(--orange);font-weight:600}
.minibar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;flex:1}
.minibar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.proj-grid{display:grid;grid-template-columns:65px 1fr 1fr 1fr;gap:4px;align-items:center}
.proj-row{padding:8px 0;border-bottom:1px solid var(--border)}
.proj-row:last-child{border-bottom:none}
.result-box{border-radius:10px;padding:14px 16px;margin-bottom:14px}
.timeline-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1}
.mp-btn{border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px;border:1px solid var(--border);background:var(--bgInput);color:var(--text)}
.mp-btn.active{background:rgba(249,115,22,.09);border-color:var(--orange);color:var(--orange);font-weight:700}
.cb-box{width:20px;height:20px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.cb-box.checked{border-color:var(--orange);background:var(--orange)}
.hist-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex:1}
.kpi-box{background:var(--bgInput);border-radius:8px;padding:10px 8px;text-align:center}
.kpi-label{color:var(--textDim);font-size:9px;margin-bottom:3px;font-weight:600;letter-spacing:.5px}
.kpi-value{font-size:16px;font-weight:800}
@media(max-width:400px){.grid-3{grid-template-columns:1fr 1fr}}
</style>

<body>
<div class="wrap" id="app"></div>

<script>
// ─── MARKETPLACES (solo .es y .com) ─────────────────────────
const MARKETPLACES = {
  es: { label:"Amazon.es", flag:"\u{1F1EA}\u{1F1F8}", currency:"\u20AC", locale:"es-ES",
    royaltyBands:{high:{min:2.99,max:9.99,rate:.70},low:{rate:.35}},
    pbPrinting:{fixed:0.60,perPage:0.012,royaltyRate:0.60,defaultPages:150},
    bsrCurve:{A:4500,B:.75},
    revenueThresholds:[
      {min:15000,score:95,label:"Mercado fuerte"},{min:10000,score:80,label:"Mercado grande"},
      {min:7000,score:65,label:"Mercado sano"},{min:5000,score:50,label:"Mercado viable"},
      {min:3000,score:35,label:"Mercado peque\u00F1o"},{min:2000,score:20,label:"Mercado limitado"},
      {min:0,score:5,label:"Mercado muerto"}],
    bsrThresholds:[
      {max:10000,score:90,label:"Demanda alta"},{max:30000,score:75,label:"Demanda buena"},
      {max:50000,score:55,label:"Demanda aceptable"},{max:80000,score:35,label:"Demanda baja"},
      {max:100000,score:18,label:"Demanda muy baja"},{max:Infinity,score:5,label:"Sin demanda"}],
    defaultVentasDia:{top5:8,top10:4,top20:2},
    note:"Mercado medio. Buena base para libros en espa\u00F1ol."
  },
  com: { label:"Amazon.com", flag:"\u{1F1FA}\u{1F1F8}", currency:"$", locale:"en-US",
    royaltyBands:{high:{min:2.99,max:9.99,rate:.70},low:{rate:.35}},
    pbPrinting:{fixed:0.85,perPage:0.012,royaltyRate:0.60,defaultPages:150},
    bsrCurve:{A:18000,B:.78},
    revenueThresholds:[
      {min:40000,score:95,label:"Mercado fuerte"},{min:25000,score:80,label:"Mercado grande"},
      {min:15000,score:65,label:"Mercado sano"},{min:10000,score:50,label:"Mercado viable"},
      {min:6000,score:35,label:"Mercado peque\u00F1o"},{min:3000,score:20,label:"Mercado limitado"},
      {min:0,score:5,label:"Mercado muerto"}],
    bsrThresholds:[
      {max:20000,score:90,label:"Demanda alta"},{max:60000,score:75,label:"Demanda buena"},
      {max:100000,score:55,label:"Demanda aceptable"},{max:150000,score:35,label:"Demanda baja"},
      {max:250000,score:18,label:"Demanda muy baja"},{max:Infinity,score:5,label:"Sin demanda"}],
    defaultVentasDia:{top5:15,top10:7,top20:3},
    note:"Mercado m\u00E1s grande del mundo. Umbrales y competencia m\u00E1s altos."
  },
};

// ─── STATE ──────────────────────────────────────────────────
const S = {
  step:0, marketplace:"es", keyword:"", metodo:"helium",
  revenue:"", bsr:"",
  pocasResenas:"", calidadPortadas:"", calidadDescripciones:"",
  precio:"", costePortada:"", costeFormateo:"", costeAds:"", adsMensuales:"",
  incluyePaperback:false, precioPB:"", numPaginas:"",
  history:[], copied:false,
};

// KEY FIX: separate "silent update" (no re-render) from "full render"
// Inputs use setVal() which does NOT re-render — just stores the value.
// Buttons/nav use go() which DOES re-render.
function setVal(key, val) {
  S[key] = val;
  // Update live score boxes without full re-render
  updateLiveScores();
}

function go(patch) {
  Object.assign(S, patch);
  render();
}

function togglePaperback() {
  S.incluyePaperback = !S.incluyePaperback;
  // Patch checkbox visually
  const box = document.getElementById("pb-box");
  if (box) {
    if (S.incluyePaperback) { box.classList.add("checked"); box.innerHTML = '<span style="color:#fff;font-size:12px;font-weight:800">\u2713</span>'; }
    else { box.classList.remove("checked"); box.innerHTML = ""; }
  }
  // Show/hide PB fields
  const fields = document.getElementById("pb-fields");
  if (fields) fields.style.display = S.incluyePaperback ? "block" : "none";
  updateLiveScores();
}

// ─── SCORING ENGINE ─────────────────────────────────────────
function estimateSalesFromBSR(bsr, mk) {
  const m = MARKETPLACES[mk], {A, B: e} = m.bsrCurve;
  return Math.max(.1, +(A * Math.pow(Math.max(bsr,1), -e)).toFixed(1));
}

function getDynVentas() {
  const mk = S.marketplace, mp = MARKETPLACES[mk], p = parseFloat(S.precio) || 4.99;
  let base;
  if (S.metodo === "helium" && parseFloat(S.revenue) > 0)
    base = parseFloat(S.revenue) / 10 / 30 / Math.max(p, 1);
  else if (S.metodo === "bsr" && parseFloat(S.bsr) > 0)
    base = estimateSalesFromBSR(parseFloat(S.bsr), mk);
  else return mp.defaultVentasDia;
  base = Math.max(.1, +base.toFixed(1));
  return {top5: Math.max(1, +(base*1.8).toFixed(1)), top10: Math.max(.5, +base.toFixed(1)), top20: Math.max(.2, +(base*.5).toFixed(1))};
}

function scoreFiltro1() {
  const mk = S.marketplace, mp = MARKETPLACES[mk];
  if (S.metodo === "helium") {
    const r = parseFloat(S.revenue); if (!r && r !== 0) return null;
    for (const t of mp.revenueThresholds) if (r >= t.min) {
      const d = t.score >= 50
        ? `Revenue ${mp.currency}${r.toLocaleString(mp.locale)} en ${mp.label}. ${t.score >= 70 ? "Demanda clara." : "Confirma competencia."}`
        : `Revenue ${mp.currency}${r.toLocaleString(mp.locale)} en ${mp.label}. ${t.score >= 30 ? "Solo viable con competencia muy baja." : "Siguiente idea."}`;
      return {score: t.score, label: t.label, detail: d};
    }
  } else {
    const b = parseFloat(S.bsr); if (!b && b !== 0) return null;
    for (const t of mp.bsrThresholds) if (b <= t.max) {
      const est = estimateSalesFromBSR(b, mk);
      return {score: t.score, label: t.label, detail: `BSR ${b.toLocaleString("es")} en ${mp.label} \u2248 ${est} ventas/d\u00EDa \u2014 ${t.score >= 50 ? "mercado activo." : t.score >= 30 ? "mercado marginal." : "sin demanda real."}`};
    }
  }
  return {score: 5, label: "Sin demanda", detail: "Mercado inexistente."};
}

function scoreFiltro2() {
  const pr = parseInt(S.pocasResenas), cp = parseInt(S.calidadPortadas), cd = parseInt(S.calidadDescripciones);
  if (isNaN(pr) || isNaN(cp) || isNaN(cd)) return null;
  const srR = Math.min(pr/10,1)*100, srP = Math.max(0,(5-cp)/4)*100, srD = Math.max(0,(5-cd)/4)*100;
  const score = Math.round(srR*.4 + srP*.3 + srD*.3);
  let label, detail;
  if (score >= 70) {label="Competencia d\u00E9bil"; detail="Puedes entrar con un listing bien optimizado. Hay huecos claros.";}
  else if (score >= 50) {label="Competencia media"; detail="Necesitar\u00E1s portada profesional y descripci\u00F3n optimizada para destacar.";}
  else if (score >= 30) {label="Competencia alta"; detail="Los top 10 est\u00E1n bien posicionados. Entrada costosa y lenta.";}
  else {label="Competencia feroz"; detail="Dominado por libros consolidados. Busca un subnicho m\u00E1s espec\u00EDfico.";}
  return {score, label, detail, breakdown: {resenas: Math.round(srR), portadas: Math.round(srP), descripciones: Math.round(srD)}};
}

// ─── PAPERBACK KDP ENGINE ────────────────────────────────────
// Coste de impresion KDP: fijo + perPage * paginas (B&W, trim 6x9)
function calcPBPrinting(mp, pages) {
  const pb = mp.pbPrinting;
  return +(pb.fixed + pb.perPage * Math.max(pages, 24)).toFixed(2);
}

// Precio minimo KDP: Amazon exige que el precio cubra impresion a 60%
// minPrice = printCost / 0.60 (redondeado al .99 mas cercano)
function calcPBMinPrice(mp, pages) {
  const printCost = calcPBPrinting(mp, pages);
  const raw = printCost / mp.pbPrinting.royaltyRate;
  return +(Math.ceil(raw) - 0.01).toFixed(2); // ej: 3.34 → 3.99
}

// Precio sugerido: 2.5x coste impresion (margen sano), al .99
function calcPBSuggestedPrice(mp, pages) {
  const printCost = calcPBPrinting(mp, pages);
  const raw = printCost * 2.5;
  return +(Math.ceil(raw) - 0.01).toFixed(2);
}

// Regalia tapa blanda KDP: 60% x precio - coste impresion
function calcPBRoyalty(mp, pricePB, pages) {
  const printCost = calcPBPrinting(mp, pages);
  return Math.max(0, +(pricePB * mp.pbPrinting.royaltyRate - printCost).toFixed(2));
}

// Ratio de ventas PB vs ebook (industria KDP: 30-40%)
const PB_SALES_RATIO = 0.35;

function scoreFiltro3() {
  const mk = S.marketplace, mp = MARKETPLACES[mk], p = parseFloat(S.precio);
  if (!p) return null;
  const cP = parseFloat(S.costePortada)||0, cF = parseFloat(S.costeFormateo)||0, cAI = parseFloat(S.costeAds)||0;
  const adsR = parseFloat(S.adsMensuales)||0;
  const bands = mp.royaltyBands, rate = (p >= bands.high.min && p <= bands.high.max) ? bands.high.rate : bands.low.rate;
  const royaltyUnit = +(p * rate).toFixed(2), inv = cP + cF + cAI;

  // Paperback real calc
  const usePB = S.incluyePaperback;
  const pbPages = usePB ? (parseInt(S.numPaginas) || mp.pbPrinting.defaultPages) : 0;
  const pbPrice = usePB ? (parseFloat(S.precioPB) || calcPBSuggestedPrice(mp, pbPages)) : 0;
  const pbPrintCost = usePB ? calcPBPrinting(mp, pbPages) : 0;
  const pbRoyaltyUnit = usePB ? calcPBRoyalty(mp, pbPrice, pbPages) : 0;

  const vd = getDynVentas();
  const projs = {top5:{ventasDia:vd.top5,label:"Top 5"}, top10:{ventasDia:vd.top10,label:"Top 10"}, top20:{ventasDia:vd.top20,label:"Top 20"}};
  for (const k of Object.keys(projs)) {
    const pr = projs[k];
    // Ebook royalties
    pr.ebookBruto = +(pr.ventasDia * 30 * royaltyUnit).toFixed(0);
    // PB royalties: ventas PB = ventas ebook * ratio industria
    pr.pbVentasDia = usePB ? +(pr.ventasDia * PB_SALES_RATIO).toFixed(1) : 0;
    pr.pbBruto = usePB ? Math.round(pr.pbVentasDia * 30 * pbRoyaltyUnit) : 0;
    // Totals
    pr.ingresoBruto = pr.ebookBruto + pr.pbBruto;
    pr.ingresoNeto = Math.max(0, pr.ingresoBruto - adsR);
    pr.margenPct = pr.ingresoBruto > 0 ? Math.round(pr.ingresoNeto / pr.ingresoBruto * 100) : 0;
    pr.mesesBreakEven = pr.ingresoNeto > 0 && inv > 0 ? Math.ceil(inv / pr.ingresoNeto) : inv <= 0 ? 0 : -1;
    pr.acos = pr.ingresoBruto > 0 ? Math.round(adsR / pr.ingresoBruto * 100) : 999;
  }
  const beCop = royaltyUnit > 0 ? Math.ceil(inv / royaltyUnit) : 9999;
  const net10 = projs.top10.ingresoNeto, mBE = projs.top10.mesesBreakEven;
  const annualNet = net10 * 12;
  const roi = inv > 0 ? Math.round(((annualNet - inv) / inv) * 100) : annualNet > 0 ? 9999 : 0;
  let score, label, detail;
  if (mBE === -1) {score=5; label="No rentable"; detail=`Los ads (${mp.currency}${adsR}/mes) superan ingresos.`;}
  else if (mBE <= 1 && net10 > 0) {score=95; label="Muy rentable"; detail=`Break-even en 1 mes. Neto ${mp.currency}${net10}/mes. ROI: ${roi}%.`;}
  else if (mBE <= 3) {score=80; label="Rentable"; detail=`Break-even en ${mBE} meses. Neto ${mp.currency}${net10}/mes. ROI: ${roi}%.`;}
  else if (mBE <= 6) {score=60; label="Viable"; detail=`Break-even ${mBE} meses. Margen ${projs.top10.margenPct}%. ROI: ${roi}%.`;}
  else if (mBE <= 12) {score=40; label="Ajustado"; detail=`Break-even ${mBE} meses. Considera reducir ads o subir precio.`;}
  else if (mBE <= 24) {score=20; label="Dif\u00EDcil"; detail=`Break-even ${mBE} meses. Inversi\u00F3n alta vs retorno lento.`;}
  else {score=5; label="No rentable"; detail="+24 meses. Replantea costes.";}
  return {score, label, detail, royaltyRate:rate, royaltyUnit, inversionInicial:inv, breakEvenCopias:beCop, projections:projs, adsRecurrentes:adsR, currency:mp.currency, roi, annualNet, ventasDia:vd, isDynamic:true,
    pb:{active:usePB, price:pbPrice, pages:pbPages, printCost:pbPrintCost, royaltyUnit:pbRoyaltyUnit, salesRatio:PB_SALES_RATIO}};
}

function compositeScore(a, b, c) {return (!a||!b||!c) ? null : Math.round(a.score*.4 + b.score*.35 + c.score*.25)}

function getVerdict(c) {
  if (c >= 75) return {emoji:"\u{1F7E2}", label:"ADELANTE", color:"var(--green)", msg:"Tu nicho pasa los 3 filtros. Tienes datos s\u00F3lidos para empezar."};
  if (c >= 55) return {emoji:"\u{1F7E1}", label:"VIABLE CON AJUSTES", color:"var(--yellow)", msg:"Hay potencial pero necesitas reforzar el filtro m\u00E1s d\u00E9bil."};
  if (c >= 35) return {emoji:"\u{1F7E0}", label:"RIESGO ALTO", color:"var(--orange)", msg:"Dos o m\u00E1s filtros est\u00E1n d\u00E9biles. Considera un subnicho diferente."};
  return {emoji:"\u{1F534}", label:"SIGUIENTE IDEA", color:"var(--red)", msg:"Este nicho no tiene las condiciones. Mejor 15 min buscando otro que 4 meses perdidos."};
}

function getSmartTips(s1, s2, s3, kw, mk) {
  const mp = MARKETPLACES[mk], tips = [];
  if (!s1 || !s2 || !s3) return tips;
  if (s1.score < 40) tips.push({icon:"\u{1F50D}", text:`La demanda para \u00AB${kw}\u00BB es baja en ${mp.label}. Prueba variaciones con modificadores de audiencia.`, ref:"Cap. 2 \u2014 Filtro 1"});
  if (s1.score >= 40 && s1.score < 60) tips.push({icon:"\u{1F4D0}", text:"Demanda borderline. Cruza con un nicho adyacente para ampliar mercado.", ref:"Cap. 2 \u2014 Filtro 1"});
  if (s2.score >= 70) tips.push({icon:"\u26A1", text:"Competencia d\u00E9bil = ventana. Invierte en portada profesional para dominar el top 10.", ref:"Cap. 6 \u2014 Punto 8"});
  if (s2.score < 40 && s2.breakdown) {
    if (s2.breakdown.resenas < 30) tips.push({icon:"\u{1F6E1}\uFE0F", text:"Muchas rese\u00F1as en competencia. Necesitar\u00E1s un \u00E1ngulo \u00FAnico y estrategia de rese\u00F1as.", ref:"Cap. 7 \u2014 Semana 1"});
    if (s2.breakdown.portadas > 60) tips.push({icon:"\u{1F3A8}", text:"Portadas d\u00E9biles. Una profesional te da ventaja inmediata en CTR.", ref:"Cap. 6 \u2014 Punto 8"});
  }
  if (s3.adsRecurrentes > 0 && s3.projections) {
    const a10 = s3.projections.top10.acos;
    if (a10 > 70) tips.push({icon:"\u{1F525}", text:`ACOS ${a10}% = quema dinero. Reduce ads o busca nicho con ACOS < 50%.`, ref:"Cap. 5 \u2014 Regla 3"});
    else if (a10 > 50) tips.push({icon:"\u26A0\uFE0F", text:`ACOS ${a10}%. Margen fino. Vigila semanalmente.`, ref:"Cap. 5 \u2014 Regla 1"});
    if (s3.projections.top10.mesesBreakEven > 6) tips.push({icon:"\u{1F4B0}", text:"+6 meses de break-even con ads. Valora empezar org\u00E1nico.", ref:"Cap. 3 + Cap. 5"});
  }
  if (s3.score < 40 && s3.breakEvenCopias > 200) tips.push({icon:"\u{1F4B0}", text:`Break-even ${s3.breakEvenCopias} copias. Sube precio a banda 70%, reduce portada, o recorta ads.`, ref:"Cap. 5 \u2014 Regla 1"});
  if (s3.royaltyRate === .35) tips.push({icon:"\u26A0\uFE0F", text:"Banda del 35%. Sube a 2,99+ para casi duplicar la regal\u00EDa.", ref:"Cap. 6 \u2014 Punto 21"});
  if (s1.score >= 60 && s2.score >= 60 && s3.score >= 60) tips.push({icon:"\u{1F680}", text:"Los 3 filtros son fuertes. Empieza la Fase G del M\u00E9todo GST hoy.", ref:"Cap. 4 \u2014 Fase G"});
  if (s1.score >= 70 && s2.score < 40) tips.push({icon:"\u{1F3AF}", text:"Demanda fuerte + competencia feroz. Busca un subnicho m\u00E1s espec\u00EDfico.", ref:"Cap. 2 \u2014 Filtro 2"});
  if (s2.score >= 70 && s1.score < 40) tips.push({icon:"\u{1F4CA}", text:"Competencia d\u00E9bil + demanda baja. Verifica que el mercado no se est\u00E9 muriendo.", ref:"Cap. 2 \u2014 Filtro 1"});
  if (!tips.length) tips.push({icon:"\u{1F4CB}", text:"Revisa rese\u00F1as negativas de los 3-4 competidores top. Cada queja = cap\u00EDtulo potencial.", ref:"Cap. 2 \u2014 Filtro 2"});
  return tips.slice(0, 4);
}

function getActionPlan(comp, s1, s2, s3, kw) {
  if (comp === null) return [];
  const plan = [];
  if (comp >= 55) {
    plan.push({week:"Sem. 1", task:"Validar keyword y definir estructura del libro", done:true, ref:"Cap. 2-3"});
    plan.push({week:"Sem. 2-3", task:"Escribir contenido (Fase G: genera)", ref:"Cap. 4 \u2014 Fase G"});
    plan.push({week:"Sem. 3", task:"Encargar portada profesional", ref:"Cap. 6 \u2014 Punto 8"});
    plan.push({week:"Sem. 4", task:"Formatear manuscrito + subir a KDP (Fase S: sube)", ref:"Cap. 4 \u2014 Fase S"});
    plan.push({week:"Sem. 5", task:"Lanzamiento + primera campa\u00F1a de ads (Fase T: tracci\u00F3n)", ref:"Cap. 4 \u2014 Fase T + Cap. 5"});
    plan.push({week:"Sem. 6-7", task:"Optimizar ads, conseguir primeras rese\u00F1as", ref:"Cap. 5 + Cap. 7"});
    if (S.incluyePaperback) {
      const mp = MARKETPLACES[S.marketplace], pbPg = parseInt(S.numPaginas)||mp.pbPrinting.defaultPages, pbP = parseFloat(S.precioPB)||calcPBSuggestedPrice(mp, pbPg);
      const pbRoy = calcPBRoyalty(mp, pbP, pbPg);
      plan.push({week:"Sem. 8", task:`Publicar tapa blanda (${mp.currency}${pbP}, ${pbPg}p \u2192 regal\u00EDa ${mp.currency}${pbRoy.toFixed(2)}/ud)`, ref:"Cap. 6 \u2014 Punto 21"});
    }
    plan.push({week:"D\u00EDa 30+", task:"Evaluar ACOS, ajustar precio, escalar o pivotar", ref:"Cap. 7 \u2014 Despu\u00E9s del d\u00EDa 30"});
  } else if (comp >= 35) {
    if (s1.score < 50) plan.push({week:"Ahora", task:`Buscar variaciones de \u00AB${kw}\u00BB con m\u00E1s demanda`, ref:"Cap. 2 \u2014 Filtro 1"});
    if (s2.score < 50) plan.push({week:"Ahora", task:"Analizar subnichos con menos competencia", ref:"Cap. 2 \u2014 Filtro 2"});
    if (s3.score < 50) plan.push({week:"Ahora", task:"Replantear precio y presupuesto de ads", ref:"Cap. 5 \u2014 Regla 1"});
    plan.push({week:"Despu\u00E9s", task:"Re-validar con el nuevo nicho/keyword", ref:"Cap. 2"});
  } else {
    plan.push({week:"Ahora", task:"Descarta este nicho y busca otro (15 min m\u00E1ximo)", ref:"Cap. 2"});
    plan.push({week:"Pr\u00F3ximo", task:"Valida 3-5 keywords nuevas hasta encontrar una viable", ref:"Cap. 2"});
  }
  return plan;
}

function generateReport(kw, mk, s1, s2, s3, comp, verdict, tips, plan) {
  const mp = MARKETPLACES[mk], c = mp.currency;
  const date = new Date().toLocaleDateString("es-ES", {year:"numeric", month:"long", day:"numeric"});
  let r = `# VALIDACI\u00D3N DE NICHO \u2014 JIRAFA ROYALTIES\nFecha: ${date}\nMarketplace: ${mp.flag} ${mp.label}\nKeyword: \u00AB${kw}\u00BB\n\n---\n\n`;
  r += `## RESULTADO: ${verdict.emoji} ${verdict.label} (${comp}/100)\n${verdict.msg}\n\n`;
  r += `## DESGLOSE POR FILTRO\n\n| Filtro | Score | Valoraci\u00F3n |\n|--------|-------|------------|\n`;
  r += `| Demanda (40%) | ${s1.score}/100 | ${s1.label} |\n| Competencia (35%) | ${s2.score}/100 | ${s2.label} |\n| Rentabilidad (25%) | ${s3.score}/100 | ${s3.label} |\n\n`;
  r += `## N\u00DAMEROS CLAVE\n\n- Regal\u00EDa/unidad: ${c}${s3.royaltyUnit.toFixed(2)} (${(s3.royaltyRate*100).toFixed(0)}%)\n- Inversi\u00F3n: ${c}${s3.inversionInicial}\n- Break-even: ${s3.breakEvenCopias} copias\n- ROI anual estimado: ${s3.roi}%\n`;
  if (s3.adsRecurrentes > 0) r += `- Ads mensuales: ${c}${s3.adsRecurrentes}\n`;
  if (s3.pb.active) {
    r += `- Tapa blanda: ${c}${s3.pb.price} (${s3.pb.pages} p\u00E1g)\n`;
    r += `- Coste impresi\u00F3n: ${c}${s3.pb.printCost.toFixed(2)}\n`;
    r += `- Regal\u00EDa PB/unidad: ${c}${s3.pb.royaltyUnit.toFixed(2)} (60% \u2212 impresi\u00F3n)\n`;
    r += `- Ratio ventas PB/ebook: ${Math.round(s3.pb.salesRatio*100)}%\n`;
  }
  r += `\n`;
  if (s3.projections) {
    const usePB = s3.pb.active;
    r += `## PROYECCIONES (${mp.label}${usePB ? " \u2014 ebook + tapa blanda" : ""})\n\n`;
    r += `| Pos. | Ventas/d\u00EDa | ${usePB ? "Ebook | PB |" : "Bruto |"} Ads | NETO | ACOS | BE |\n`;
    r += `|------|-----------|${usePB ? "-------|-----|" : "-------|"}----|------|------|----|\n`;
    for (const pr of Object.values(s3.projections)) {
      const be = pr.mesesBreakEven === -1 ? "Nunca" : pr.mesesBreakEven === 0 ? "\u2014" : `${pr.mesesBreakEven}m`;
      const vLabel = usePB ? `${pr.ventasDia}+${pr.pbVentasDia}` : `${pr.ventasDia}`;
      if (usePB) {
        r += `| ${pr.label} | ${vLabel} | ${c}${pr.ebookBruto} | ${c}${pr.pbBruto} | ${c}${s3.adsRecurrentes} | ${c}${pr.ingresoNeto} | ${pr.acos}% | ${be} |\n`;
      } else {
        r += `| ${pr.label} | ${vLabel} | ${c}${pr.ingresoBruto} | ${c}${s3.adsRecurrentes} | ${c}${pr.ingresoNeto} | ${pr.acos}% | ${be} |\n`;
      }
    }
    r += `\n`;
  }
  if (plan.length) {r += `## PLAN DE ACCI\u00D3N (M\u00E9todo GST)\n\n`; plan.forEach(p => r += `- **${p.week}**: ${p.task} \u2192 ${p.ref}\n`); r += `\n`;}
  if (tips.length) {r += `## RECOMENDACIONES\n\n`; tips.forEach(t => r += `${t.icon} ${t.text}\n   \u2192 ${t.ref}\n\n`);}
  r += `---\n\u{1F992} Generado con el Validador de Nichos \u2014 Jirafa Royalties\nRegal\u00EDas hoy, libertad ma\u00F1ana.\n`;
  return r;
}

// ─── HELPERS ────────────────────────────────────────────────
function esc(s) {const d = document.createElement("div"); d.textContent = s; return d.innerHTML;}
function scoreColor(s) {return s >= 70 ? "var(--green)" : s >= 50 ? "var(--yellow)" : s >= 30 ? "var(--orange)" : "var(--red)";}
function scoreBg(s) {return s >= 70 ? "var(--greenBg)" : s >= 50 ? "var(--yellowBg)" : s >= 30 ? "rgba(249,115,22,.08)" : "var(--redBg)";}
function scoreBorder(s) {return s >= 70 ? "var(--greenBorder)" : s >= 50 ? "var(--yellowBorder)" : s >= 30 ? "rgba(249,115,22,.38)" : "var(--redBorder)";}

function resultBoxHTML(r) {
  if (!r) return "";
  return `<div class="result-box" style="background:${scoreBg(r.score)};border:1px solid ${scoreBorder(r.score)}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span style="font-weight:700;font-size:13px;color:${scoreColor(r.score)}">${esc(r.label)}</span>
      <span style="font-weight:800;font-size:15px;color:${scoreColor(r.score)}">${r.score}/100</span>
    </div>
    <p style="color:var(--textMuted);font-size:12px;margin:0;line-height:1.5">${esc(r.detail)}</p>
  </div>`;
}

function minibarHTML(score, label) {
  return `<div style="display:flex;align-items:center;gap:10px;width:100%">
    <span style="font-size:12px;color:var(--textMuted);width:90px;flex-shrink:0">${label}</span>
    <div class="minibar-track"><div class="minibar-fill" style="width:${score}%;background:${scoreColor(score)}"></div></div>
    <span style="font-size:12px;font-weight:700;color:${scoreColor(score)};width:30px;text-align:right">${score}</span>
  </div>`;
}

function gaugeHTML(score, size, sw, label, id) {
  const r2 = (size - sw) / 2, circ = 2 * Math.PI * r2;
  const color = scoreColor(score);
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r2}" fill="none" stroke="var(--border)" stroke-width="${sw}"/>
      <circle id="${id}" cx="${size/2}" cy="${size/2}" r="${r2}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"
        stroke-dasharray="${circ}" stroke-dashoffset="${circ}" data-target="${circ - (score/100) * circ}"/>
    </svg>
    <div style="position:relative;margin-top:-${size-8}px;height:${size-16}px;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <span id="${id}-num" style="font-size:${size*.28}px;font-weight:800;color:${color};line-height:1">0</span>
      <span style="font-size:10px;color:var(--textDim);font-weight:600">/100</span>
    </div>
    ${label ? `<span style="font-size:11px;color:var(--textMuted);font-weight:600;margin-top:2px">${label}</span>` : ""}
  </div>`;
}

function animateGauges() {
  document.querySelectorAll("[data-target]").forEach(el => {
    const target = parseFloat(el.dataset.target), circ = parseFloat(el.getAttribute("stroke-dasharray"));
    const numEl = document.getElementById(el.id + "-num");
    const totalScore = Math.round((1 - target / circ) * 100);
    let start = null;
    function step(ts) {
      if (!start) start = ts;
      const p = Math.min((ts - start) / 1200, 1), ease = 1 - Math.pow(1 - p, 3);
      el.setAttribute("stroke-dashoffset", circ - (totalScore * ease / 100) * circ);
      if (numEl) numEl.textContent = Math.round(totalScore * ease);
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

      <button class="btn-primary" style="flex:1" onclick="resetAll()">Validar otro nicho \u2192</button>
    </div>
    <p style="text-align:center;color:var(--textDim);font-size:11px;margin:8px 0 0">\u{1F992} Jirafa Royalties \u2014 Regal\u00EDas hoy, libertad ma\u00F1ana</p>`;
  }

  app.innerHTML = h;

  if (S.step === 4) setTimeout(animateGauges, 50);

  // Trigger initial live score update for steps 1-3
  if (S.step >= 1 && S.step <= 3) setTimeout(updateLiveScores, 10);
}

// ─── GLOBAL ACTIONS ─────────────────────────────────────────
function resetAll() {
  const s1 = scoreFiltro1(), s2 = scoreFiltro2(), s3 = scoreFiltro3();
  const comp = compositeScore(s1, s2, s3);
  if (comp !== null) S.history.push({keyword: S.keyword, composite: comp, s1: s1?.score, s2: s2?.score, s3: s3?.score, mp: MARKETPLACES[S.marketplace].label});
  Object.assign(S, {step:0, keyword:"", revenue:"", bsr:"", pocasResenas:"", calidadPortadas:"", calidadDescripciones:"", precio:"", costePortada:"", costeFormateo:"", costeAds:"", adsMensuales:"", incluyePaperback:false, precioPB:"", numPaginas:"", copied:false});
  render();
}

function getReportText() {
  const s1 = scoreFiltro1(), s2 = scoreFiltro2(), s3 = scoreFiltro3();
  const comp = compositeScore(s1, s2, s3);
  if (!s1 || !s2 || !s3 || comp === null) return "";
  const verdict = getVerdict(comp);
  const tips = getSmartTips(s1, s2, s3, S.keyword, S.marketplace);
  const plan = getActionPlan(comp, s1, s2, s3, S.keyword);
  return generateReport(S.keyword, S.marketplace, s1, s2, s3, comp, verdict, tips, plan);
}

function copyReport() {
  const txt = getReportText(); if (!txt) return;
  navigator.clipboard.writeText(txt).then(() => { S.copied = true; render(); setTimeout(() => { S.copied = false; render(); }, 2500); }).catch(() => downloadReport());
}

function downloadReport() {
  const txt = getReportText(); if (!txt) return;
  const blob = new Blob([txt], {type:"text/markdown;charset=utf-8"});
  const url = URL.createObjectURL(blob), a = document.createElement("a");
  a.href = url; a.download = `validacion-${S.keyword.replace(/\s+/g, "-").toLowerCase()}-${S.marketplace}.md`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ─── INIT ───────────────────────────────────────────────────
render();
</script>
